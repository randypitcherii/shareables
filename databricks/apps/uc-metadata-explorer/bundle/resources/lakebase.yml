resources:
  postgres_projects:
    uc_metadata_project:
      project_id: ${var.lakebase_project_id}
      display_name: UC Metadata
      default_endpoint_settings:
        autoscaling_limit_min_cu: 0.5
        autoscaling_limit_max_cu: 0.5
        suspend_timeout_duration: 900s

  postgres_branches:
    uc_metadata_dev_branch:
      parent: ${resources.postgres_projects.uc_metadata_project.name}
      branch_id: dev-${var.git_branch_slug}
      no_expiry: true

  postgres_endpoints:
    uc_metadata_dev_rw:
      parent: ${resources.postgres_branches.uc_metadata_dev_branch.name}
      endpoint_id: ${var.lakebase_endpoint_id}
      endpoint_type: ENDPOINT_TYPE_READ_WRITE
      autoscaling_limit_min_cu: 0.5
      autoscaling_limit_max_cu: 0.5
      suspend_timeout_duration: 900s
