<div class="header">
  <h1>From system tables to cost analytics</h1>
  <p>The README's ASCII tree is flat — you can't see materializations, the incremental priced fact, or the join that actually produces list_cost.</p>
</div>

<div class="diagram-wrap">

    <stop offset="50%"  stop-color="#B14EFF"/>

  <filter id="neonGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00E5FF" flood-opacity="0.7"/>
    <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#B14EFF" flood-opacity="0.5"/>
    <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#FF2E93" flood-opacity="0.4"/>

  <!-- Subtle view tag: light blue-grey -->
  <!-- Subtle table tag: light warm grey -->
</defs>
