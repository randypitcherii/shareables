name: 'rpw_dbt_databricks_reference'
version: '1.0.0'

profile: 'rpw_dbt_databricks_reference'

# ---------------------------------------------------------------------------
# Environment-driven configuration (the portable-onboarding pattern)
#
# Each value reads an environment variable when set, else falls back to a public
# dev default that lives in source control. The trade-off: dev fallbacks are
# visible to anyone reading the repo -- in exchange, a brand-new contributor can
# clone and `dbt build` with ZERO configuration (no `dbt init`, no secrets) and
# land safely in their own isolated dev schema.
#
# Non-dev deployments (CI / prod) inject the real values via environment variables;
# nothing sensitive is ever committed. See macros/config/generate_schema_name.sql
# for how `deployment_environment` routes schemas.
# ---------------------------------------------------------------------------
vars:
  # one of: development | ci_testing | production
  deployment_environment: "{{ env_var('DBT_DEPLOYMENT_ENVIRONMENT', 'development') }}"
  default_catalog: "{{ env_var('DBT_DEFAULT_CATALOG', 'analytics_dev') }}"
  default_schema: "{{ env_var('DBT_DEFAULT_SCHEMA', 'dbt') }}"
  # full-refresh history window for system.billing.usage; incremental runs scan only
  # recent data regardless. Keep small for quick demo builds, raise for real backfills.
  usage_history_days: "{{ env_var('DBT_USAGE_HISTORY_DAYS', 90) }}"

flags:
  use_managed_iceberg: true

models:
  rpw_dbt_databricks_reference:
    # defaults for every model in the project
    +materialized: view
    +persist_docs:
      relation: true
      columns: true

    # ---- layer-specific configuration ----
    # `daily` is the production cadence tag: the DAB job runs `dbt build -s tag:daily`
    # on a daily schedule. Models without it (e.g. managed_iceberg_examples) are
    # intentionally outside the production DAG.
    staging:
      +tags: [staging, daily]
      +schema: staging
      +materialized: view

    modeled:
      +tags: [modeled, daily]
      +schema: modeled
      +materialized: table
      +auto_liquid_cluster: true

    marts:
      +tags: [mart, daily]
      +schema: mart
      +materialized: table
      +auto_liquid_cluster: true
      # Grants-as-code: in production, consumers get read access to the marts as part
      # of every run -- no manual GRANTs. Empty list otherwise, which tells dbt to
      # actively revoke stray grants on dev/CI sandboxes. The condition checks the CLI
      # var (how the production job injects it) and falls back to the env var.
      +grants:
        select: "{{ ['account users'] if var('deployment_environment', env_var('DBT_DEPLOYMENT_ENVIRONMENT', 'development')) == 'production' else [] }}"

    managed_iceberg_examples:
      +materialized: table
      +table_format: iceberg
      +auto_liquid_cluster: false
      +tblproperties:
        'format-version': 3
      +schema: managed_iceberg_examples
