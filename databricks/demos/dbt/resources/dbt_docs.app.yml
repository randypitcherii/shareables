resources:
  apps:
    dbt_docs:
      name: dbt-demo-docs-${bundle.target}
      description: Serves dbt docs generated by the production rpw-dbt-databricks-reference workflow.
      source_code_path: ../docs_app
      resources:
        - name: dbt-docs-volume
          description: Read access to generated dbt docs in the production artifacts volume.
          uc_securable:
            securable_type: VOLUME
            securable_full_name: ${var.production_catalog}.${var.production_artifact_schema}.${var.production_artifact_volume}
            permission: READ_VOLUME
        - name: dbt-production-job
          description: Read access to the production dbt workflow run status.
          job:
            id: ${resources.jobs.dbt_production_daily.id}
            permission: CAN_VIEW
      config:
        command:
          - python
          - app.py
        env:
          - name: DBT_DEPLOYMENT_ENVIRONMENT
            value: production
          - name: DBT_ARTIFACT_VOLUME_FULL_NAME
            value_from: dbt-docs-volume
          - name: DBT_ARTIFACT_CATALOG
            value: ${var.production_catalog}
          - name: DBT_ARTIFACT_SCHEMA
            value: ${var.production_artifact_schema}
          - name: DBT_ARTIFACT_VOLUME
            value: ${var.production_artifact_volume}
          - name: DBT_PRODUCTION_JOB_ID
            value_from: dbt-production-job
