resources:
  postgres_projects:
    app_project:
      project_id: ${var.lakebase_project_id}
      display_name: Randy Apps Starter
      default_endpoint_settings:
        autoscaling_limit_min_cu: 0.5
        autoscaling_limit_max_cu: 0.5
        suspend_timeout_duration: 900s

  postgres_branches:
    app_branch:
      parent: ${resources.postgres_projects.app_project.name}
      branch_id: ${var.lakebase_branch_id}
      no_expiry: true

  postgres_endpoints:
    app_rw_endpoint:
      parent: ${resources.postgres_branches.app_branch.name}
      endpoint_id: ${var.lakebase_endpoint_id}
      endpoint_type: ENDPOINT_TYPE_READ_WRITE
      autoscaling_limit_min_cu: 0.5
      autoscaling_limit_max_cu: 0.5
      suspend_timeout_duration: 900s

  database_instances:
    app_database_instance:
      name: ${var.lakebase_project_id}
      capacity: CU_1
