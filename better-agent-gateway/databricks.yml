bundle:
  name: better-agent-gateway

sync:
  include:
    - frontend/dist/**

include:
  - bundle/resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
